# Local full-stack test: run `supabase start` first, then `docker compose up web`
# .env.local should point NEXT_PUBLIC_SUPABASE_URL at http://localhost:54321
# For production, pass env vars directly at runtime — do not bake them into the image

services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
